spring:
  config:
    activate:
      on-profile: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/nextoraDB_dev
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    enabled: true

  # Email Configuration (Gmail SMTP)
  # For Gmail: Enable 2FA, then create an App Password at:
  # https://myaccount.google.com/apppasswords
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    # Disable connection validation at startup (set to true when credentials are configured)
    test-connection: false
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# App Configuration
app:
  base-url: http://localhost:8081
  mail:
    from: ${MAIL_USERNAME:noreply@nextora.lk}
    from-name: Nextora

# AWS S3 Configuration
aws:
  s3:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    region: ${AWS_REGION}
    bucket-name: ${AWS_S3_BUCKET}

server:
  port: 8081

logging:
  level:
    root: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Firebase Configuration for Development
# Set FIREBASE_ENABLED=true and provide serviceAccountKey.json to enable push notifications
firebase:
  enabled: ${FIREBASE_ENABLED:true}
  config-path: ${FIREBASE_CONFIG_PATH:classpath:firebase/serviceAccountKey.json}
