spring:
  config:
    activate:
      on-profile: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/nextoraDB_dev
    username: postgres
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    enabled: true

server:
  port: 8081

logging:
  level:
    root: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
