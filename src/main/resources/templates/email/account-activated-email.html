<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #10B981; color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; background-color: #f9f9f9; }
        .button { display: inline-block; padding: 12px 30px; background-color: #10B981; color: white; text-decoration: none; border-radius: 5px; margin: 20px 0; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Account Activated!</h1>
        </div>
        <div class="content">
            <h2>Hello {{firstName}},</h2>
            <p>Great news! Your email has been verified and your account is now active.</p>
            <p>You can now log in to Nextora and start using all features.</p>
            <p style="text-align: center;">
                <a href="{{loginUrl}}" class="button">Log In Now</a>
            </p>
            <p>Thank you for joining Nextora!</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 Nextora. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
