spring:
  config:
    activate:
      on-profile: prod

  datasource:
    driver-class-name: org.postgresql.Driver
    # AWS RDS PostgreSQL Configuration
    # Replace the following with your actual RDS endpoint and credentials
    url: jdbc:postgresql://${RDS_ENDPOINT:database-2.cchqm8mywb1x.us-east-1.rds.amazonaws.com}:5432/${RDS_DB_NAME:postgres}?sslmode=verify-full&sslrootcert=${RDS_SSL_CERT_PATH:./global-bundle.pem}
    username: ${RDS_USERNAME:postgres}
    password: ${RDS_PASSWORD:}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    validate-on-migrate: true

server:
  port: 8082

logging:
  level:
    root: WARN
    lk.iit.campus: INFO

# Firebase Configuration for Production
# REQUIRED: Set environment variables for push notifications
# - FIREBASE_ENABLED=true
# - FIREBASE_SERVICE_ACCOUNT_PATH=/path/to/serviceAccountKey.json
firebase:
  enabled: ${FIREBASE_ENABLED:true}
  service-account:
    path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
  token-cleanup:
    enabled: true
    days-old: 30
    cron: "0 0 3 * * *"

