spring:
  application:
    name: nextora-project

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/nextora_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "nextora:"

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  jmx:
    enabled: false

  flyway:
    enabled: false

server:
  port: 8080
  max-http-request-header-size: 48KB

application:
  version: 1.0.0
  swagger:
    title: "Nextora API"
    description: "RESTful API for Nextora Campus Management System"
    version: "1.0.0"
    contact:
      name: "Nextora"
      url: "http://localhost:8080"
    license:
      name: "MIT License"
      url: "https://opensource.org/licenses/MIT"
    servers:
      - url: "http://localhost:8080"
        description: "Development Server"

  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000
      refresh-token:
        expiration: 604800000

logging:
  level:
    root: INFO
    lk.iit.nextora: DEBUG
    io.lettuce.core: INFO
    javax.management.remote.rmi: WARN
    sun.rmi: WARN
    org.springframework.data.redis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/application.log

# Rate Limiting Configuration
app:
  rate-limit:
    enabled: true
    algorithm: SLIDING_WINDOW
    include-headers: true

    anonymous:
      max-requests: 60
      window: 1m

    authenticated:
      max-requests: 200
      window: 1m

    auth:
      max-requests: 10
      window: 1m

    sensitive:
      max-requests: 5
      window: 5m

    exclude-paths:
      - /actuator/health
      - /swagger-ui/**
      - /v3/api-docs/**

    endpoints:
      "[/api/v1/auth/login]":
        max-requests: 5
        window: 1m
      "[/api/v1/auth/register]":
        max-requests: 3
        window: 1m
      "[/api/v1/users/**]":
        max-requests: 2
        window: 1m

management:
  endpoints:
    web:
      exposure:
        include: health

# Firebase Configuration
firebase:
  enabled: false
  config-path: classpath:firebase/serviceAccountKey.json
  project-id: ""

# AWS S3 Configuration
aws:
  s3:
    access-key: ${AWS_ACCESS_KEY:your-access-key}
    secret-key: ${AWS_SECRET_KEY:your-secret-key}
    region: ap-south-1
    bucket-name: nextora-bucket

# Async Configuration for Push Notifications
async:
  core-pool-size: 5
  max-pool-size: 20
  queue-capacity: 100
